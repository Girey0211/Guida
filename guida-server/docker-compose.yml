services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # 기본은 호스트 127.0.0.1 에만 바인딩(외부 차단).
      # 원격 dev(로컬 서버 → 원격 DB) 시 POSTGRES_BIND 를 테일스케일 IP 로 설정.
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 단일 스키마 소스. DB 볼륨 최초 생성 시 1회 실행(빈 볼륨 초기화용).
      # 이후 스키마 변경 반영은 server 부팅 시 동일 파일을 멱등 재실행해 처리한다.
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    # depends_on db 제거 — 외부 DB 사용 시 불필요
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      SERVER_PORT: ${SERVER_PORT:-3000}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATA_DIR: /app/data
    volumes:
      # 게임 데이터 JSON — 패치마다 호스트에서 교체 후 server 재시작
      - ./data:/app/data:ro
    ports:
      # 외부 직접 접근 미사용. Nginx 를 통해서만 노출되므로 127.0.0.1 바인딩 유지.
      - "127.0.0.1:${SERVER_PORT:-3000}:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - server
    ports:
      # ISP가 80 포트를 차단하는 경우가 많아 8080 외부 포트를 사용.
      # 공유기 포트포워딩: TCP 8080 → 192.168.0.193:8080
      - "8080:80"
      # HTTPS는 현재 미사용 (인증서 필요 시 활성화)
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
