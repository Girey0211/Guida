user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    sendfile        on;
    keepalive_timeout  65;

    # 로그 포맷 — Cloudflare Tunnel 뒤이므로 실제 IP는 CF-Connecting-IP 헤더 참조
    log_format  main  '$remote_addr - $http_cf_connecting_ip [$time_local] '
                      '"$request" $status $body_bytes_sent';
    access_log  /var/log/nginx/access.log  main;

    # Fastify API 서버
    upstream guida_api {
        server server:3000;
    }

    server {
        listen 80;
        server_name _;

        # 외부 트래픽은 Cloudflare Tunnel → Nginx → Fastify 순서로만 유입.
        # HTTPS 종료는 Cloudflare 엣지에서 처리되므로 여기서는 80 으로 수신한다.
        location / {
            proxy_pass         http://guida_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }
    }
}
