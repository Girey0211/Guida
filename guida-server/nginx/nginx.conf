user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    sendfile        on;
    keepalive_timeout  65;

    # 로그 포맷 — 직접 포트포워딩 방식이므로 $remote_addr 이 실제 클라이언트 IP
    # (Cloudflare Tunnel 사용 시에는 CF-Connecting-IP 헤더를 참조해야 함 — 현재 미사용)
    log_format  main  '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
    access_log  /var/log/nginx/access.log  main;

    # Fastify API 서버
    upstream guida_api {
        server server:3000;
    }

    server {
        listen 80;
        server_name _;

        # 외부 트래픽: 공유기 포트포워딩 → Nginx(8080) → Fastify(3000)
        # Cloudflare Tunnel 미사용 — 직접 포트포워딩 방식으로 운영
        location / {
            proxy_pass         http://guida_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }
    }
}
