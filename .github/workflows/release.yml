name: Release Desktop App

# v* 태그(예: v0.2.0)를 push 하면 Windows 설치 파일을 빌드·서명하고,
# GitHub Release 에 설치 파일과 함께 자동 업데이트용 매니페스트(latest.json)를
# 게시한다. 클라이언트의 Tauri updater 는 아래 URL 의 latest.json 을 읽는다:
#   https://github.com/Girey0211/Guida/releases/latest/download/latest.json
#
# 사전 준비(Settings → Secrets and variables → Actions 에 등록):
#   - TAURI_SIGNING_PRIVATE_KEY          : `npm run tauri signer generate` 로 만든 개인키 내용
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD : 위 개인키 생성 시 지정한 비밀번호
# 그리고 tauri.conf.json 의 plugins.updater.pubkey 를 같은 키쌍의 "공개키"로 교체한다.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # 릴리스 생성/자산 업로드

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'guida-client/package-lock.json'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './guida-client/src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./guida-client

      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 베이스 URL 주입.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        with:
          projectPath: ./guida-client
          # 태그 이름을 릴리스 이름/태그로 사용. tauri-action 이 설치 파일 +
          # latest.json(업데이트 매니페스트)을 릴리스에 업로드한다.
          tagName: ${{ github.ref_name }}
          releaseName: 'Guida ${{ github.ref_name }}'
          releaseBody: '자동 생성된 릴리스입니다. 설치 후 앱이 자동으로 업데이트를 확인합니다.'
          releaseDraft: false
          prerelease: false
          # 업데이터 매니페스트 파일명을 고정해 endpoints URL 과 일치시킨다.
          updaterJsonPreferNsis: true
